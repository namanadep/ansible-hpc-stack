# HPC compute nodes — three fresh containers Ansible will provision identically.
# Each node's SSH port is published to a different localhost port so Ansible can
# reach them without depending on Docker network routability.
[compute_nodes]
node1 ansible_host=127.0.0.1 ansible_port=2201
node2 ansible_host=127.0.0.1 ansible_port=2202
node3 ansible_host=127.0.0.1 ansible_port=2203

[compute_nodes:vars]
ansible_user                 = root
ansible_ssh_private_key_file = keys/id_hpc
ansible_python_interpreter   = /usr/bin/python3
